{% extends 'base.html' %}

{% block title %}Генерация QR-кода | StarLift{% endblock %}

{% block content %}
<style>
    .qr-gen-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
    }

    .qr-form-card {
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid var(--glass-border);
        border-radius: 20px;
        padding: 40px;
        max-width: 500px;
        width: 100%;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .qr-form-title {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 30px;
        text-align: center;
        line-height: 1.2;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        display: block;
        color: var(--text-main);
    }

    .form-select {
        width: 100%;
        padding: 14px 20px;
        border-radius: 12px;
        border: 2px solid var(--border-color);
        background-color: var(--bg-color);
        color: var(--text-main);
        font-size: 16px;
        appearance: none;
        outline: none;
        transition: var(--transition);
        cursor: pointer;
    }

    .form-select:focus {
        border-color: var(--sber-green);
        box-shadow: 0 0 0 4px var(--light-green);
    }

    .btn-generate {
        width: 100%;
        padding: 16px;
        border-radius: 12px;
        background-color: var(--sber-green);
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        border: none;
        cursor: pointer;
        transition: var(--transition);
        margin-top: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }

    .btn-generate:hover {
        background-color: var(--sber-green-hover);
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(10, 128, 59, 0.3);
    }

    .btn-generate:active {
        transform: translateY(0);
    }
</style>

<div class="qr-gen-container">
    <div class="qr-form-card animate-fade">
        <h2 class="qr-form-title">Создать QR-код для оценки</h2>

        <div class="form-group">
            <label class="form-label" for="speakerSelect">Выберите спикера</label>
            <select class="form-select" id="speakerSelect">
                <!-- Опция по умолчанию -->
                <option value="" disabled selected>-- Выберите спикера --</option>
                {% for speaker in speakers %}
                    <option value="{{ speaker.id }}">{{ speaker.name }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-label" for="eventSelect">Выберите мероприятие</label>
            <select class="form-select" id="eventSelect">
                <option value="" disabled selected>-- Выберите мероприятие --</option>
                {% for event in events %}
                    <option value="{{ event.id }}">{{ event.title }}</option>
                {% endfor %}
            </select>
        </div>

        <button type="button" class="btn-generate" id="generateBtn">
            <i class="fa-solid fa-qrcode"></i> Сгенерировать
        </button>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const generateBtn = document.getElementById('generateBtn');
        const speakerSelect = document.getElementById('speakerSelect');
        const eventSelect = document.getElementById('eventSelect');

        generateBtn.addEventListener('click', function() {
            const speakerId = speakerSelect.value;
            const eventId = eventSelect.value;

            if (!speakerId || !eventId) {
                alert('Пожалуйста, выберите спикера и мероприятие.');
                return;
            }

            // Формируем ссылку на основе имеющегося шаблона url - '/speaker/<speaker_id>/event/<event_id>/qr/'
            const qrUrl = `/speaker/${speakerId}/event/${eventId}/qr/`;
            window.location.href = qrUrl;
        });
    });
</script>
{% endblock %}
